      let html = `<div class="explore-info">
        <strong>${profile.name || profile.login}</strong> — ${profile.type} — ${repos.length} public repos<br>
        <span style="color:#666;font-size:11px">Select chapter count above, then press Enter to generate worlds for top repos</span>
      </div>`;
      for (const r of topRepos) {
        html += `<div class="explore-repo">
          <span>${r.name} <span style="color:#555">${r.language || ""}</span></span>
          <span class="stars">${r.stars} ★</span>
        </div>`;
      }
      explorePreview.innerHTML = html;
      explorePreview.classList.add("show");
      modalStatus.textContent = `Press Enter to generate worlds for top ${selectedChapterCount} repos`;
      modalStatus.style.color = "#22cc66";
    }

    async function launchBatchGeneration() {
      if (!exploreData) return;
      const { profile, repos } = exploreData;
      const count = Math.min(selectedChapterCount, repos.length);
      const topRepos = repos.slice(0, count);
      const repoUrls = topRepos.map(r => r.url);

      // Close modal, show constellation
      repoModal.classList.remove("show");
      explorePreview.classList.remove("show");
      resetViewerState();

      // Show constellation grid
      showConstellation(profile, topRepos);

      // Start batch generation
      modalStatus.textContent = "";
      setGeneratingState("generating");

      try {
        await fetch(`${apiBase}/api/batch`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repo_urls: repoUrls, model: selectedModel }),
        });
      } catch (err) {
        console.error("Batch error:", err);
      }
    }

    function resetViewerState() {
      bible = null;
      chapters = [];
      currentChapter = -1;
      stopPlayback();
      stopMusicPlayback();
      clearAvatars();
      disposeSplat();
      if (panoMesh) { scene.remove(panoMesh); panoMesh.geometry.dispose(); panoMesh.material.dispose(); panoMesh = null; }
      scene.background = new THREE.Color(0x050510);
      hudName.textContent = "";
      hudTagline.textContent = "";
      hudChapter.textContent = "";
      hudGenre.textContent = "";
      hudStatus.textContent = "";
      marbleLink.style.display = "none";
      tlItems.innerHTML = "";
      introOverlay.style.display = "flex";
      introOverlay.classList.remove("fade-out");
      introTitle.textContent = "NARRATIVE ENGINE";
    }

    // ═══════════════════════════════════════════════════
    //  CONSTELLATION VIEW — user/org world grid
    // ═══════════════════════════════════════════════════
    const constellationEl = document.getElementById("constellation");
    const constHeader = document.getElementById("const-header");
    const constGrid = document.getElementById("const-grid");
    const constClose = document.getElementById("const-close");
    let constellationWorlds = new Map(); // repo_url → { card element, status }
    let constellationContributors = []; // all contributors for avatar loading

    constClose.addEventListener("click", () => {
      constellationEl.classList.remove("show");
    });

    function showConstellation(profile, repos) {
      // Fade intro
      introOverlay.classList.add("fade-out");
      setTimeout(() => introOverlay.style.display = "none", 1500);

      // Header
      constHeader.innerHTML = `
        <img src="${profile.avatar_url}" alt="${profile.login}" />
        <h2>${(profile.name || profile.login).toUpperCase()}</h2>
        ${profile.bio ? `<div class="const-bio">${profile.bio}</div>` : ""}
        <div class="const-stats">${profile.type} — ${profile.public_repos} public repos — generating ${repos.length} worlds</div>
      `;

      // Grid cards (placeholder state)
      constGrid.innerHTML = "";
      constellationWorlds.clear();

      for (const repo of repos) {
        const card = document.createElement("div");
        card.className = "const-card generating";
        card.innerHTML = `
          <div class="const-thumb-placeholder">generating...</div>
          <div class="const-info">
            <div class="const-world-name">—</div>
            <div class="const-repo-name">${repo.name}</div>
            <div class="const-desc">${repo.description || ""}</div>
            <div class="const-meta">
              <span>${repo.language || "—"}</span>
              <span>${repo.stars} ★</span>
            </div>
            <div class="const-status status-generating">generating...</div>
          </div>
        `;
        constGrid.appendChild(card);
        constellationWorlds.set(repo.url, { card, repo });
      }

      constellationEl.classList.add("show");
    }

    // Update constellation cards as worlds complete (via SSE)
    function updateConstellationCard(repoUrl, worldData) {
      // Find by matching repo URL in history
      for (const [url, entry] of constellationWorlds) {
        // Match by repo name since URLs might differ slightly
        if (repoUrl && url.includes(repoUrl.split("/").pop())) {
          const { card } = entry;
          card.className = "const-card ready";

          const thumb = worldData.thumbnail_url
            ? `<img class="const-thumb" src="${worldData.thumbnail_url}" />`
            : `<div class="const-thumb-placeholder">ready</div>`;

          const genreColor = {
            noir:"#8888aa", cyberpunk:"#00d4ff", solarpunk:"#44cc66", brutalist:"#888",
            cathedral:"#aa88cc", clockwork:"#daa520", arctic:"#88ccff", volcanic:"#dd4422",
            deep_sea:"#2266aa", zen_garden:"#66aa66", coral_reef:"#ff8866", mythic:"#cc8844",
            art_deco:"#ddaa44", steampunk:"#cc8833", crystalline:"#aaccff", orbital:"#6688cc",
            frontier:"#88aa44", biopunk:"#66cc88", floating_islands:"#88aadd", underground:"#886644",
            aurora:"#88ddaa", desert_mirage:"#ddaa66", overgrown:"#669944", neon_bazaar:"#ff66aa",
            ancient_ruins:"#aa8866", industrial:"#888888",
          }[worldData.genre] || "#666";

          card.querySelector(".const-info").innerHTML = `
            <div class="const-world-name">${worldData.world_name || "—"}</div>
            <div class="const-repo-name">${entry.repo.name}</div>
            <div class="const-desc">${entry.repo.description || ""}</div>
            <div class="const-meta">
              <span>${entry.repo.language || "—"}</span>
              <span>${entry.repo.stars} ★</span>
            </div>
            <div class="const-genre-tag" style="color:${genreColor};border:1px solid ${genreColor}40">${worldData.genre || ""}</div>
            <div class="const-status status-ready">ready</div>
          `;

          // Replace placeholder with thumbnail
          const thumbEl = card.querySelector(".const-thumb-placeholder");
          if (thumbEl && worldData.thumbnail_url) {
            const img = document.createElement("img");
            img.className = "const-thumb";
            img.src = worldData.thumbnail_url;
            thumbEl.replaceWith(img);
          }

          // Click to enter world
          card.onclick = () => {
            constellationEl.classList.remove("show");
            clearAvatars();
            if (worldData.pano_url) loadPanorama(worldData.pano_url);
            hudName.textContent = worldData.world_name || "";
            hudTagline.textContent = worldData.tagline || "";
            showRepoLink(url);
            hudGenre.textContent = worldData.genre || "";
            hudChapter.textContent = worldData.chapter_title || "";
            currentGenre = worldData.genre || "orbital";
            if (worldData.marble_url) {
              marbleLink.href = worldData.marble_url;
              marbleLink.style.display = "block";
              marbleLink.textContent = "Marble 3D";
            }

            // Load all contributor avatars into the 3D scene
            if (constellationContributors.length > 0) {
              constellationContributors.forEach((c, i) => {
                addAvatar(c.avatar_url, c.login, i, constellationContributors.length);
              });
            }
          };

          constellationWorlds.delete(url);
          break;
        }
      }
    }

    // ═══════════════════════════════════════════════════
    //  CONTRIBUTORS — explore the people behind a repo
    // ═══════════════════════════════════════════════════
    const btnContributors = document.getElementById("btn-contributors");

    // Show Contributors button when a single repo is loaded
    function showContributorsButton() {
      if (currentRepoUrl) btnContributors.style.display = "block";
      else btnContributors.style.display = "none";
    }

    btnContributors.addEventListener("click", async () => {
      if (!currentRepoUrl) return;

      btnContributors.textContent = "Loading...";
      btnContributors.disabled = true;

      try {
        const res = await fetch(`${apiBase}/api/contributors`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repo_url: currentRepoUrl, count: 8 }),
        });
        const { contributors, repo_url } = await res.json();

        if (!contributors || contributors.length === 0) {
          btnContributors.textContent = "No contributors found";
          setTimeout(() => { btnContributors.textContent = "Contributors"; btnContributors.disabled = false; }, 2000);
          return;
        }

        // Build contributor constellation
        const repoName = repo_url.replace("https://github.com/", "");
        const repos = contributors.map(c => ({
          name: c.top_repo.name,
          full_name: c.top_repo.full_name,
          url: c.top_repo.url,
          description: c.top_repo.description,
          language: c.top_repo.language,
          stars: c.top_repo.stars,
          _contributor: c,
        }));

        // Stash all contributors for avatar loading
        constellationContributors = contributors;

        // Show constellation with contributor info
        introOverlay.classList.add("fade-out");
        setTimeout(() => introOverlay.style.display = "none", 1500);

        constHeader.innerHTML = `
          <h2>CONTRIBUTORS</h2>
          <div class="const-bio">${repoName}</div>
          <div class="const-stats">${contributors.length} contributors — generating worlds from their top projects</div>
        `;

        constGrid.innerHTML = "";
        constellationWorlds.clear();

        for (const repo of repos) {
          const c = repo._contributor;
          const card = document.createElement("div");
          card.className = "const-card generating";
          card.innerHTML = `
            <div class="const-thumb-placeholder">generating...</div>
            <div class="const-info">
              <div class="const-contributor">
                <img src="${c.avatar_url}" alt="${c.login}" />
                <span class="contrib-name">${c.login}</span>
                <span class="contrib-count">${c.contributions} commits</span>
              </div>
              <div class="const-world-name">—</div>
              <div class="const-repo-name">${repo.name}</div>
              <div class="const-desc">${repo.description || ""}</div>
              <div class="const-meta">
                <span>${repo.language || "—"}</span>
                <span>${repo.stars} ★</span>
              </div>
              <div class="const-status status-generating">generating...</div>
            </div>
          `;
          constGrid.appendChild(card);
          constellationWorlds.set(repo.url, { card, repo });
        }

        constellationEl.classList.add("show");
        setGeneratingState("generating");

        // Launch batch generation
        const repoUrls = repos.map(r => r.url);
        await fetch(`${apiBase}/api/batch`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repo_urls: repoUrls, model: selectedModel }),
        });
      } catch (err) {
        console.error("Contributors error:", err);
        btnContributors.textContent = "Error";
      } finally {
        btnContributors.textContent = "Contributors";
        btnContributors.disabled = false;
      }
    });

    // ─── Repo link helper ──────────────────────────────
    function showRepoLink(url) {
      if (!url) { hudRepo.classList.remove("visible"); return; }
      const short = url.replace("https://github.com/", "");
      hudRepo.textContent = short;
      hudRepo.href = url;
      hudRepo.classList.add("visible");
    }

    // ═══════════════════════════════════════════════════
    //  BIBLE READY
    // ═══════════════════════════════════════════════════
    function onBibleReady() {
      if (!bible) return;

      introTitle.textContent = bible.world_name.toUpperCase();
      introSub.textContent = bible.tagline;
      introSub.classList.remove("connecting");

      hudName.textContent = bible.world_name;
      hudTagline.textContent = bible.tagline;
      hudGenre.textContent = `${bible.genre} / ${bible.subgenre}`;

      // Update browser URL for shareability
      if (bible.repo_identity?.name) {
        const path = `/${bible.repo_identity.name}`;
        if (window.location.pathname !== path) {
          history.pushState(null, bible.world_name, path);
        }
        document.title = `${bible.world_name} — git_world`;
      }

      const bg = parseInt(bible.visual_palette.primary.replace("#", ""), 16);
      scene.background = new THREE.Color(bg).multiplyScalar(0.08);
      if (particles) {
        const accent = parseInt(bible.visual_palette.accent.replace("#", ""), 16);
        particles.material.color.setHex(accent);
      }

      // Update playback bar color
      const accentColor = bible.visual_palette.accent || "#22cc66";
      playbackFill.style.background = accentColor;

      // Set music genre from Story Bible
      currentGenre = bible.genre || "orbital";
      // If music is already playing, restart with new genre
      if (musicPlaying) { stopMusicPlayback(); startMusic(); }

      setTimeout(() => {
        introOverlay.classList.add("fade-out");
        setTimeout(() => introOverlay.style.display = "none", 1500);
      }, 2500);

      // Fetch contributors in background and add avatars to scene
      if (currentRepoUrl && !constellationEl.classList.contains("show")) {
        loadRepoAvatars(currentRepoUrl);
      }
    }

    async function loadRepoAvatars(repoUrl) {
      try {
        const res = await fetch(`${apiBase}/api/contributors`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repo_url: repoUrl, count: 6 }),
        });
        const data = await res.json();
        if (data.contributors && data.contributors.length > 0) {
          clearAvatars();
          data.contributors.forEach((c, i) => {
            addAvatar(c.avatar_url, c.login, i, data.contributors.length);
          });
        }
      } catch {
        // Silent fail — avatars are optional
      }
    }

    // ═══════════════════════════════════════════════════
    //  CHAPTER TIMELINE (replaces simple nav buttons)
    // ═══════════════════════════════════════════════════
    function buildTimeline() {
      tlItems.innerHTML = "";
      const readyChapters = chapters.filter(c => c.status === "ready");

      for (const ch of chapters) {
        const item = document.createElement("div");
        item.className = "tl-item" + (ch.chapter_index === currentChapter ? " active" : "") + (ch.status !== "ready" ? " disabled" : "");

        const color = typeColors[ch.chapter_type] || "#666";
        item.innerHTML = `
          <div class="tl-dot" style="background:${color}"></div>
          <div class="tl-info">
            <div class="tl-title">${ch.chapter_index + 1}. ${ch.episode_title}</div>
            <div class="tl-meta">${ch.chapter_type.replace("_"," ")} ${ch.status !== "ready" ? " — " + ch.status : ""}</div>
          </div>
        `;

        if (ch.status === "ready") {
          item.addEventListener("click", () => {
            stopPlayback();
            navigateToChapter(ch.chapter_index);
            timelineEl.classList.remove("show");
            timelineOpen = false;
          });
        }
        tlItems.appendChild(item);
      }
    }

    btnTimeline.addEventListener("click", () => {
      timelineOpen = !timelineOpen;
      timelineEl.classList.toggle("show", timelineOpen);
      btnTimeline.classList.toggle("active", timelineOpen);
    });

    // ═══════════════════════════════════════════════════
    //  PLAYBACK — watch all chapters sequentially
    // ═══════════════════════════════════════════════════
    function getReadyChapters() {
      return chapters.filter(c => c.status === "ready");
    }

    function startPlayback() {
      const ready = getReadyChapters();
      if (ready.length === 0) return;

      isPlaying = true;
      btnPlay.textContent = "Pause";
      btnPlay.classList.add("active");
      playbackBar.classList.add("show");
      controls.autoRotate = true;
      if (!autoFlying) startAutoFly(); // fly during playback
      if (!musicPlaying) startMusic(); // soundtrack during playback

      // Start from first chapter if none selected, or next chapter
      const startIdx = currentChapter < 0 ? ready[0].chapter_index : currentChapter;
      navigateToChapter(startIdx);
      scheduleNextChapter();
    }

    function stopPlayback() {
      isPlaying = false;
      btnPlay.textContent = "Play All";
      btnPlay.classList.remove("active");
      playbackBar.classList.remove("show");
      controls.autoRotate = false;
      stopAutoFly();
      if (playTimer) { clearTimeout(playTimer); playTimer = null; }
    }

    function scheduleNextChapter() {
      if (!isPlaying) return;
      playStartTime = performance.now();

      playTimer = setTimeout(() => {
        if (!isPlaying) return;
        const ready = getReadyChapters();
        const currentReadyIdx = ready.findIndex(c => c.chapter_index === currentChapter);
        const nextReadyIdx = (currentReadyIdx + 1) % ready.length;

        // If we've looped back to start, stop
        if (nextReadyIdx === 0 && currentReadyIdx === ready.length - 1) {
          stopPlayback();
          return;
        }

        navigateToChapter(ready[nextReadyIdx].chapter_index);
        scheduleNextChapter();
      }, PLAY_INTERVAL);
    }

    btnPlay.addEventListener("click", () => {
      if (isPlaying) stopPlayback();
      else startPlayback();
    });

    // ─── Prev / Next ──────────────────────────────────
    btnPrev.addEventListener("click", () => {
      stopPlayback();
      const ready = getReadyChapters();
      if (ready.length === 0) return;
      const curIdx = ready.findIndex(c => c.chapter_index === currentChapter);
      const prev = curIdx > 0 ? curIdx - 1 : ready.length - 1;
      navigateToChapter(ready[prev].chapter_index);
    });

    btnNext.addEventListener("click", () => {
      stopPlayback();
      const ready = getReadyChapters();
      if (ready.length === 0) return;
      const curIdx = ready.findIndex(c => c.chapter_index === currentChapter);
      const next = (curIdx + 1) % ready.length;
      navigateToChapter(ready[next].chapter_index);
    });

    // Keyboard shortcuts
    document.addEventListener("keydown", (e) => {
      if (repoModal.classList.contains("show")) return;
      if (e.target.tagName === "INPUT") return;
      if (e.key === "ArrowLeft") btnPrev.click();
      if (e.key === "ArrowRight") btnNext.click();
      if (e.key === " ") { e.preventDefault(); btnPlay.click(); }
    });

    // ═══════════════════════════════════════════════════
    //  NAVIGATE TO CHAPTER
    // ═══════════════════════════════════════════════════
    async function navigateToChapter(index) {
      const ch = chapters[index];
      if (!ch) return;

      currentChapter = index;
      const ready = getReadyChapters();
      const readyIdx = ready.findIndex(c => c.chapter_index === index);
      hudChapter.textContent = `Chapter ${index + 1}: ${ch.episode_title}`;

      // Chapter title card
      const color = typeColors[ch.chapter_type] || "#ccc";
      cardType.textContent = ch.chapter_type.replace("_", " ");
      cardType.style.color = color;
      cardTitle.textContent = ch.episode_title;
      cardLine.style.background = color;
      cardCounter.textContent = `${readyIdx + 1} of ${ready.length}`;
      chapterCard.classList.add("visible");
      setTimeout(() => chapterCard.classList.remove("visible"), 4000);

      // Marble link
      if (ch.marble_url) {
        marbleLink.href = ch.marble_url;
        marbleLink.style.display = "block";
        marbleLink.textContent = "Marble 3D";
      }

      // Try 3D splat first, fall back to panorama
      disposeSplat();
      let loaded3d = false;
      if (ch.spz_url && sparkReady) {
        loaded3d = await loadSplat(ch.spz_url);
      }
      if (!loaded3d && ch.pano_url) {
        try { await loadPanorama(ch.pano_url); } catch (err) { console.warn("Pano load failed:", err); }
      }

      buildTimeline();

      // Dock floating avatars to HUD once world is visible
      setTimeout(dockAvatars, 1000);
    }

    // ─── Playback progress bar update ─────────────────
    function updatePlaybackBar() {
      if (isPlaying) {
        const elapsed = performance.now() - playStartTime;
        const pct = Math.min((elapsed / PLAY_INTERVAL) * 100, 100);
        playbackFill.style.width = pct + "%";
      }
    }

    // ─── Render loop (setAnimationLoop for WebXR compat) ──
    function animate() {
      updateWASD();
      updateAutoFly();
      controls.update();
      animateParticles();
      animateAvatars();
      updatePlaybackBar();
      renderer.render(scene, camera);
    }
    renderer.setAnimationLoop(animate);
    animate();

    // ─── Resize ───────────────────────────────────────
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
