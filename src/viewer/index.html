<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narrative Engine — World Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'SF Mono', 'Fira Code', monospace; color: #eee; }
    #canvas { width: 100%; height: 100%; display: block; position: fixed; top: 0; left: 0; }

    /* ─── Intro overlay ──────────────────────────────── */
    #intro-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 1.5s ease;
    }
    #intro-overlay.fade-out { opacity: 0; pointer-events: none; }
    #intro-overlay .intro-text { text-align: center; }
    #intro-overlay h1 { font-size: 36px; letter-spacing: 3px; margin-bottom: 8px; }
    #intro-overlay p { font-size: 16px; color: #666; }
    .connecting { animation: pulse 1.5s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ─── Chapter title card ─────────────────────────── */
    #chapter-card {
      position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; z-index: 50; pointer-events: none;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #chapter-card.visible { opacity: 1; }
    #chapter-card .type { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; }
    #chapter-card .title { font-size: 42px; font-weight: 700; letter-spacing: 2px; margin-bottom: 12px; }
    #chapter-card .line { width: 200px; height: 2px; margin: 0 auto; }
    #chapter-card .counter { font-size: 13px; color: #666; margin-top: 10px; }

    /* ─── HUD ────────────────────────────────────────── */
    #hud {
      position: fixed; bottom: 24px; left: 24px; z-index: 20;
      max-width: 400px;
    }
    #hud .world-name { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    #hud .tagline { font-size: 14px; color: #999; margin-bottom: 12px; font-style: italic; }
    #hud .chapter { font-size: 15px; color: #ccc; margin-bottom: 2px; }
    #hud .genre { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
    #hud .status { margin-top: 8px; font-size: 12px; }
    .repo-link {
      font-size: 12px; color: #6688cc; text-decoration: none; margin-bottom: 8px;
      display: none; transition: color 0.15s;
    }
    .repo-link:hover { color: #88aaee; text-decoration: underline; }
    .repo-link.visible { display: block; }
    .status-ready { color: #22cc66; }
    .status-generating { color: #ddaa22; }
    .status-failed { color: #dd4422; }

    /* ─── Bottom bar: chapters + controls ─────────────── */
    #bottom-bar {
      position: fixed; bottom: 24px; right: 24px; z-index: 20;
      display: flex; gap: 12px; align-items: center;
    }
    #bottom-bar button {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #ccc; padding: 8px 16px; font-size: 13px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    #bottom-bar button:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #bottom-bar button.active { border-color: #22cc66; color: #22cc66; }
    #bottom-bar button:disabled { opacity: 0.3; cursor: default; }

    /* ─── Playback progress bar ──────────────────────── */
    #playback-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 3px;
      background: rgba(255,255,255,0.05); z-index: 30; display: none;
    }
    #playback-bar.show { display: block; }
    #playback-fill {
      height: 100%; width: 0%; transition: width 0.3s linear;
    }

    /* ─── Chapter timeline drawer ─────────────────────── */
    #timeline {
      position: fixed; bottom: 70px; right: 24px; z-index: 25;
      background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px); max-height: 60vh; overflow-y: auto;
      width: 320px; display: none; padding: 0;
    }
    #timeline.show { display: block; }
    #timeline .tl-header {
      padding: 14px 16px 10px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 2px; color: #666; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tl-item {
      padding: 12px 16px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 12px; align-items: center;
    }
    .tl-item:hover { background: rgba(255,255,255,0.05); }
    .tl-item.active { background: rgba(255,255,255,0.08); }
    .tl-item.disabled { opacity: 0.3; cursor: default; }
    .tl-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .tl-info { flex: 1; min-width: 0; }
    .tl-title { font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-meta { font-size: 11px; color: #666; margin-top: 2px; }

    /* ─── Gallery (previous worlds) ─────────────────── */
    #gallery {
      position: fixed; top: 60px; right: 24px; z-index: 25;
      background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px); max-height: 70vh; overflow-y: auto;
      width: 340px; display: none; padding: 0;
    }
    #gallery.show { display: block; }
    #gallery .gal-header {
      padding: 14px 16px 10px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 2px; color: #666; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .gal-item {
      padding: 12px 16px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .gal-item:hover { background: rgba(255,255,255,0.05); }
    .gal-name { font-size: 14px; color: #ddd; font-weight: 600; margin-bottom: 2px; }
    .gal-tag { font-size: 12px; color: #888; font-style: italic; margin-bottom: 4px; }
    .gal-meta { font-size: 11px; color: #555; display: flex; gap: 8px; }
    .gal-chapters { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .gal-chapters a {
      font-size: 11px; color: #6688cc; text-decoration: none; padding: 2px 6px;
      border: 1px solid rgba(102,136,204,0.3); transition: all 0.15s;
    }
    .gal-chapters a:hover { background: rgba(102,136,204,0.15); color: #88aaee; }
    .gal-empty { padding: 20px 16px; color: #555; font-size: 13px; text-align: center; }

    /* ─── Top bar ────────────────────────────────────── */
    #top-bar {
      position: fixed; top: 24px; right: 24px; z-index: 20;
      display: flex; gap: 10px; align-items: center;
    }
    #top-bar a, #top-bar button {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #ccc; padding: 8px 14px; font-size: 12px; text-decoration: none;
      font-family: inherit; transition: all 0.2s; cursor: pointer;
    }
    #top-bar a:hover, #top-bar button:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ─── Repo input modal ───────────────────────────── */
    #repo-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 300;
    }
    #repo-modal.show { display: flex; }
    #repo-modal-inner { text-align: center; width: 560px; max-width: 90vw; }
    #repo-modal-inner h2 { font-size: 18px; font-weight: 600; letter-spacing: 1px; margin-bottom: 16px; }
    #repo-modal-inner input[type="text"] {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 14px 20px; font-size: 16px; width: 100%;
      font-family: inherit; outline: none; text-align: center;
    }
    #repo-modal-inner input::placeholder { color: #555; }
    #repo-modal-inner input:focus { border-color: #22cc66; }
    .modal-hint { color: #444; font-size: 12px; margin-top: 8px; }
    .modal-row {
      display: flex; gap: 12px; align-items: center; justify-content: center;
      margin-top: 16px;
    }
    .modal-row label { color: #888; font-size: 13px; }
    .chapter-selector {
      display: flex; gap: 4px;
    }
    .chapter-selector button {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      color: #888; width: 36px; height: 36px; font-size: 14px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .chapter-selector button:hover { background: rgba(255,255,255,0.12); color: #ccc; }
    .chapter-selector button.selected { border-color: #22cc66; color: #22cc66; background: rgba(34,204,102,0.1); }
    .model-selector { gap: 50px !important; }
    .model-selector button { padding: 12px 28px; font-size: 13px; white-space: nowrap; width: auto; }
    .modal-status { color: #ddaa22; font-size: 13px; margin-top: 12px; min-height: 20px; }
    #repo-modal .close-btn {
      position: absolute; top: 24px; right: 24px;
      background: none; border: none; color: #666; font-size: 24px; cursor: pointer;
    }
    #repo-modal .close-btn:hover { color: #fff; }

    /* ─── Controls hint ──────────────────────────────── */
    #controls-hint {
      position: fixed; top: 24px; left: 24px; z-index: 20;
      font-size: 11px; color: #444; line-height: 1.6;
    }
    #controls-hint span { color: #666; }

    /* ─── Constellation grid ─────────────────────────── */
    #constellation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
      z-index: 90; display: none; overflow-y: auto;
      padding: 60px 40px;
    }
    #constellation.show { display: block; }
    .const-header {
      text-align: center; margin-bottom: 40px;
    }
    .const-header img {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15); margin-bottom: 12px;
    }
    .const-header h2 { font-size: 24px; letter-spacing: 2px; margin-bottom: 4px; }
    .const-header .const-bio { color: #888; font-size: 13px; margin-bottom: 8px; }
    .const-header .const-stats { color: #555; font-size: 12px; }
    .const-close {
      position: fixed; top: 20px; right: 24px; z-index: 95;
      background: none; border: none; color: #666; font-size: 28px; cursor: pointer;
    }
    .const-close:hover { color: #fff; }
    .const-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; max-width: 1200px; margin: 0 auto;
    }
    .const-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      padding: 0; cursor: pointer; transition: all 0.2s; overflow: hidden;
    }
    .const-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); transform: translateY(-2px); }
    .const-card.generating { border-color: rgba(221,170,34,0.3); }
    .const-card.ready { border-color: rgba(34,204,102,0.3); }
    .const-thumb {
      width: 100%; height: 160px; object-fit: cover; display: block;
      background: rgba(255,255,255,0.02);
    }
    .const-thumb-placeholder {
      width: 100%; height: 160px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.02); color: #333; font-size: 12px;
    }
    .const-info { padding: 14px 16px; }
    .const-world-name { font-size: 15px; font-weight: 600; color: #ddd; margin-bottom: 4px; }
    .const-repo-name { font-size: 12px; color: #6688cc; margin-bottom: 4px; }
    .const-desc { font-size: 11px; color: #666; margin-bottom: 6px; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .const-meta { font-size: 11px; color: #555; display: flex; gap: 10px; }
    .const-genre-tag {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      padding: 2px 8px; border-radius: 2px; display: inline-block; margin-top: 6px;
    }
    .const-status { font-size: 11px; margin-top: 6px; }

    .const-contributor {
      display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
    }
    .const-contributor img {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
    }
    .const-contributor .contrib-name { font-size: 13px; color: #aaa; }
    .const-contributor .contrib-count { font-size: 11px; color: #555; }

    /* ─── Explore preview in modal ────────────────────── */
    #explore-preview {
      margin-top: 16px; text-align: left; max-height: 200px; overflow-y: auto;
      display: none;
    }
    #explore-preview.show { display: block; }
    .explore-info { text-align: center; color: #888; font-size: 13px; margin-bottom: 10px; }
    .explore-repo {
      padding: 6px 12px; font-size: 12px; color: #999; display: flex; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .explore-repo .stars { color: #ddaa22; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="intro-overlay">
    <div class="intro-text">
      <h1 id="intro-title">NARRATIVE ENGINE</h1>
      <p id="intro-sub" class="connecting">connecting...</p>
    </div>
  </div>

  <div id="chapter-card">
    <div class="type" id="card-type"></div>
    <div class="title" id="card-title"></div>
    <div class="line" id="card-line"></div>
    <div class="counter" id="card-counter"></div>
  </div>

  <div id="hud">
    <div class="world-name" id="hud-name"></div>
    <div class="tagline" id="hud-tagline"></div>
    <a class="repo-link" id="hud-repo" href="#" target="_blank" rel="noopener"></a>
    <div class="chapter" id="hud-chapter"></div>
    <div class="genre" id="hud-genre"></div>
    <div class="status" id="hud-status"></div>
  </div>

  <div id="controls-hint">
    <span>W/S</span> forward/back &nbsp; <span>A/D</span> strafe &nbsp; <span>Q/E</span> up/down<br>
    <span>drag</span> look &nbsp; <span>scroll</span> zoom &nbsp; <span>F</span> fly &nbsp; <span>M</span> music
  </div>

  <div id="top-bar">
    <button id="btn-gallery" title="Previous worlds">Worlds</button>
    <button id="btn-contributors" title="Explore contributor worlds" style="display:none">Contributors</button>
    <button id="btn-new-repo" title="Generate world for a new repo">+ New Repo</button>
    <a id="marble-link" target="_blank" rel="noopener" style="display:none">Marble 3D</a>
    <button id="btn-vr" style="display:none" title="Enter VR">Enter VR</button>
  </div>

  <div id="gallery">
    <div class="gal-header">Previous Worlds</div>
    <div id="gal-items"></div>
  </div>

  <div id="bottom-bar">
    <button id="btn-prev" title="Previous chapter">&larr;</button>
    <button id="btn-music" title="Toggle soundtrack (M)">Music</button>
    <button id="btn-fly" title="Auto-fly cinematic camera">Fly</button>
    <button id="btn-play" title="Auto-play all chapters">Play All</button>
    <button id="btn-next" title="Next chapter">&rarr;</button>
    <button id="btn-timeline" title="Chapter list">Chapters</button>
  </div>

  <div id="playback-bar"><div id="playback-fill"></div></div>

  <div id="timeline">
    <div class="tl-header">Chapters</div>
    <div id="tl-items"></div>
  </div>

  <!-- Constellation grid (user/org view) -->
  <div id="constellation">
    <button class="const-close" id="const-close">&times;</button>
    <div class="const-header" id="const-header"></div>
    <div class="const-grid" id="const-grid"></div>
  </div>

  <!-- Repo input modal (always accessible) -->
  <div id="repo-modal">
    <button class="close-btn" id="modal-close">&times;</button>
    <div id="repo-modal-inner">
      <h2>NEW WORLD</h2>
      <input id="repo-input" type="text" placeholder="paste a GitHub repo URL" autofocus />
      <div class="modal-hint">repo: github.com/owner/repo &nbsp;|&nbsp; user/org: github.com/owner</div>
      <div class="modal-row">
        <label>Chapters:</label>
        <div class="chapter-selector" id="chapter-selector">
          <button data-n="1" class="selected">1</button>
          <button data-n="2">2</button>
          <button data-n="3">3</button>
          <button data-n="4">4</button>
          <button data-n="5">5</button>
          <button data-n="6">6</button>
          <button data-n="8">8</button>
        </div>
      </div>
      <div class="modal-row">
        <label>Model:</label>
        <div class="chapter-selector model-selector" id="model-selector">
          <button data-m="Marble 0.1-mini" class="selected">Mini (fast, cheaper)</button>
          <button data-m="Marble 0.1-plus">Plus (high quality)</button>
        </div>
      </div>
      <div id="explore-preview"></div>
      <div class="modal-status" id="modal-status"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.170.0",
      "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/",
      "@sparkjsdev/spark": "/spark.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    // ─── State ────────────────────────────────────────
    let bible = null;
    let chapters = [];
    let currentChapter = -1;
    let panoMesh = null;
    let particles = null;
    let sparkParticles = null;
    let ringParticles = null;
    let generatingState = "idle"; // "idle" | "analyzing" | "generating" | "ready"
    let genTransition = 0; // 0 = idle, 1 = full generating intensity
    let isPlaying = false;
    let playTimer = null;
    let playProgress = 0;
    let playStartTime = 0;
    const PLAY_INTERVAL = 8000; // 8 seconds per chapter
    let timelineOpen = false;
    let selectedChapterCount = 1;
    let selectedModel = "Marble 0.1-mini";
    let currentRepoUrl = "";

    // ─── DOM refs ─────────────────────────────────────
    const canvas = document.getElementById("canvas");
    const introOverlay = document.getElementById("intro-overlay");
    const introTitle = document.getElementById("intro-title");
    const introSub = document.getElementById("intro-sub");
    const hudName = document.getElementById("hud-name");
    const hudTagline = document.getElementById("hud-tagline");
    const hudChapter = document.getElementById("hud-chapter");
    const hudRepo = document.getElementById("hud-repo");
    const hudGenre = document.getElementById("hud-genre");
    const hudStatus = document.getElementById("hud-status");
    const marbleLink = document.getElementById("marble-link");
    const chapterCard = document.getElementById("chapter-card");
    const cardType = document.getElementById("card-type");
    const cardTitle = document.getElementById("card-title");
    const cardLine = document.getElementById("card-line");
    const cardCounter = document.getElementById("card-counter");
    const repoModal = document.getElementById("repo-modal");
    const repoInput = document.getElementById("repo-input");
    const modalStatus = document.getElementById("modal-status");
    const modalClose = document.getElementById("modal-close");
    const chapterSelector = document.getElementById("chapter-selector");
    const btnNewRepo = document.getElementById("btn-new-repo");

    // Chapter count selector
    chapterSelector.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-n]");
      if (!btn) return;
      chapterSelector.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedChapterCount = parseInt(btn.dataset.n);
    });

    // Model selector
    const modelSelector = document.getElementById("model-selector");
    modelSelector.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-m]");
      if (!btn) return;
      modelSelector.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedModel = btn.dataset.m;
    });

    const btnPrev = document.getElementById("btn-prev");
    const btnPlay = document.getElementById("btn-play");
    const btnNext = document.getElementById("btn-next");
    const btnTimeline = document.getElementById("btn-timeline");
    const timelineEl = document.getElementById("timeline");
    const tlItems = document.getElementById("tl-items");
    const playbackBar = document.getElementById("playback-bar");
    const playbackFill = document.getElementById("playback-fill");

    // ─── Chapter type colors ──────────────────────────
    const typeColors = {
      genesis: "#4466aa",
      growth: "#22cc66",
      crisis: "#dd4422",
      resolution: "#ddaa22",
      maturity: "#8866cc",
      live_push: "#22ddcc",
    };

    // ─── Three.js setup ───────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.0, 0.01);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.5;
    controls.rotateSpeed = -0.25;
    controls.enablePan = false;
    controls.minDistance = 0.1;
    controls.maxDistance = 100;
    controls.target.set(0, 1.0, -1);

    // Auto-rotate during playback
    controls.autoRotate = false;
    controls.autoRotateSpeed = 0.4;

    // ─── WebXR support (Pico, Quest, etc.) ──────────
    const btnVR = document.getElementById("btn-vr");

    if ("xr" in navigator) {
      navigator.xr.isSessionSupported("immersive-vr").then((supported) => {
        if (supported) {
          renderer.xr.enabled = true;
          btnVR.style.display = "block";

          let xrSession = null;
          btnVR.addEventListener("click", async () => {
            if (xrSession) {
              xrSession.end();
              return;
            }
            try {
              xrSession = await navigator.xr.requestSession("immersive-vr", {
                optionalFeatures: ["local-floor", "bounded-floor", "hand-tracking"],
              });
              renderer.xr.setSession(xrSession);
              btnVR.textContent = "Exit VR";
              xrSession.addEventListener("end", () => {
                xrSession = null;
                btnVR.textContent = "Enter VR";
              });
            } catch (err) {
              console.warn("WebXR session failed:", err);
            }
          });
        }
      });
    }

    // ─── WASD movement ──────────────────────────────
    const moveKeys = { w: false, a: false, s: false, d: false, q: false, e: false };
    const MOVE_SPEED = 0.2;

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k in moveKeys) moveKeys[k] = true;
    });
    window.addEventListener("keyup", (e) => {
      const k = e.key.toLowerCase();
      if (k in moveKeys) moveKeys[k] = false;
    });

    function updateWASD() {
      if (autoFlying) return; // don't fight the fly camera
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      const right = new THREE.Vector3().crossVectors(dir, camera.up).normalize();

      if (moveKeys.w) { camera.position.addScaledVector(dir, MOVE_SPEED); controls.target.addScaledVector(dir, MOVE_SPEED); }
      if (moveKeys.s) { camera.position.addScaledVector(dir, -MOVE_SPEED); controls.target.addScaledVector(dir, -MOVE_SPEED); }
      if (moveKeys.a) { camera.position.addScaledVector(right, -MOVE_SPEED); controls.target.addScaledVector(right, -MOVE_SPEED); }
      if (moveKeys.d) { camera.position.addScaledVector(right, MOVE_SPEED); controls.target.addScaledVector(right, MOVE_SPEED); }
      if (moveKeys.q) { camera.position.y += MOVE_SPEED; controls.target.y += MOVE_SPEED; }
      if (moveKeys.e) { camera.position.y -= MOVE_SPEED; controls.target.y -= MOVE_SPEED; }
    }

    // ─── Auto-fly cinematic camera ──────────────────
    let autoFlying = false;
    let flyWaypoints = [];
    let flyIndex = 0;
    let flyT = 0;
    const FLY_SPEED = 0.003; // how fast we move between waypoints
    const btnFly = document.getElementById("btn-fly");

    function generateFlyPath() {
      // Generate 8-12 random waypoints in a sphere around the world center
      const count = 8 + Math.floor(Math.random() * 5);
      const points = [];
      for (let i = 0; i < count; i++) {
        const theta = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
        const phi = 0.3 + Math.random() * 1.2; // stay above ground, not too high
        const r = 1.5 + Math.random() * 3.5;
        points.push(new THREE.Vector3(
          r * Math.sin(phi) * Math.cos(theta),
          0.4 + Math.abs(Math.cos(phi)) * 2.5, // height 0.4 to 2.9
          r * Math.sin(phi) * Math.sin(theta)
        ));
      }
      return points;
    }

    function startAutoFly() {
      autoFlying = true;
      flyWaypoints = generateFlyPath();
      flyIndex = 0;
      flyT = 0;
      btnFly.classList.add("active");
      btnFly.textContent = "Stop Fly";
    }

    function stopAutoFly() {
      autoFlying = false;
      btnFly.classList.remove("active");
      btnFly.textContent = "Fly";
    }

    function updateAutoFly() {
      if (!autoFlying || flyWaypoints.length < 2) return;

      flyT += FLY_SPEED;
      if (flyT >= 1) {
        flyT = 0;
        flyIndex = (flyIndex + 1) % flyWaypoints.length;
      }

      const from = flyWaypoints[flyIndex];
      const to = flyWaypoints[(flyIndex + 1) % flyWaypoints.length];
      const next = flyWaypoints[(flyIndex + 2) % flyWaypoints.length];

      // Smooth cubic interpolation (Catmull-Rom style)
      const t = flyT;
      const t2 = t * t;
      const t3 = t2 * t;
      const ease = t3 * (6 * t2 - 15 * t + 10); // smootherstep

      // Position: lerp with easing
      camera.position.lerpVectors(from, to, ease);

      // Look target: blend between current destination and next for smooth turns
      const lookTarget = new THREE.Vector3().lerpVectors(to, next, ease * 0.5);
      // Slight offset so we're looking ahead, not at our feet
      lookTarget.y = Math.max(lookTarget.y, 0.5);
      controls.target.lerp(lookTarget, 0.05);
    }

    btnFly.addEventListener("click", () => {
      if (autoFlying) stopAutoFly();
      else startAutoFly();
    });

    // 'F' key also toggles fly
    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "f" && !repoModal.classList.contains("show")) {
        if (autoFlying) stopAutoFly();
        else startAutoFly();
      }
    });

    createParticles();

    // ─── Avatar sprites in 3D scene ──────────────────
    // ─── Avatar system (DOM-based) ────────────────────
    // Phase 1: Avatars scatter randomly, drifting with particles
    // Phase 2: When world loads, they fly to a row above bottom-right menu
    const avatarContainer = document.createElement("div");
    avatarContainer.id = "avatar-container";
    avatarContainer.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;";
    document.body.appendChild(avatarContainer);

    let avatarElements = [];
    let avatarsDocked = false;
    let avatarDockStartTime = 0;
    const DOCK_DURATION = 2000; // ms for fly-to-dock animation

    function clearAvatars() {
      avatarContainer.innerHTML = "";
      avatarElements = [];
      avatarsDocked = false;
    }

    function addAvatar(avatarUrl, name, index, total) {
      const el = document.createElement("a");
      el.href = `https://github.com/${name}`;
      el.target = "_blank";
      el.rel = "noopener";
      el.title = name;
      // No CSS transition on left/top — we animate with JS for smooth drift
      el.style.cssText = `
        position: absolute; pointer-events: auto; cursor: pointer;
        width: 40px; height: 40px; border-radius: 50%;
        border: 2px solid rgba(102,136,204,0.5);
        overflow: hidden; opacity: 0;
        box-shadow: 0 0 12px rgba(102,136,204,0.2);
        will-change: left, top, opacity;
      `;
      el.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;display:block;" crossorigin="anonymous" />`;

      // Phase 1: random scattered position (avoid edges)
      const margin = 80;
      const startX = margin + Math.random() * (window.innerWidth - margin * 2);
      const startY = margin + Math.random() * (window.innerHeight - margin * 2);
      el.style.left = startX + "px";
      el.style.top = startY + "px";
      el._x = startX;
      el._y = startY;
      el._startX = startX;
      el._startY = startY;
      el._targetX = startX;
      el._targetY = startY;
      el._index = index;
      el._total = total;
      el._driftPhase = Math.random() * Math.PI * 2;
      el._driftSpeed = 0.4 + Math.random() * 0.6;
      el._driftRadiusX = 30 + Math.random() * 50;
      el._driftRadiusY = 20 + Math.random() * 35;
      el._docked = false;
      el._dockT = 0;

      el.addEventListener("mouseenter", () => {
        el.style.border = "2px solid rgba(102,136,204,0.9)";
        el.style.boxShadow = "0 0 20px rgba(102,136,204,0.5)";
        el.style.width = "48px"; el.style.height = "48px";
      });
      el.addEventListener("mouseleave", () => {
        el.style.border = "2px solid rgba(102,136,204,0.5)";
        el.style.boxShadow = "0 0 12px rgba(102,136,204,0.2)";
        el.style.width = "40px"; el.style.height = "40px";
      });

      avatarContainer.appendChild(el);
      avatarElements.push(el);

      // Staggered fade in
      setTimeout(() => { el.style.opacity = "0.6"; }, 300 + index * 200);
    }

    function dockAvatars() {
      if (avatarsDocked || avatarElements.length === 0) return;
      avatarsDocked = true;
      avatarDockStartTime = performance.now();

      const total = avatarElements.length;
      const bottomBar = document.getElementById("bottom-bar");
      const barRect = bottomBar.getBoundingClientRect();

      avatarElements.forEach((el, i) => {
        // Target: row above bottom-right menu, right-aligned, 15px gap above
        const targetX = barRect.right - (total - i) * 48;
        const targetY = barRect.top - 55;
        el._targetX = targetX;
        el._targetY = targetY;
        // Stagger start of dock animation
        el._dockDelay = i * 150;
      });
    }

    // Animate avatars every frame
    function animateAvatars() {
      if (avatarElements.length === 0) return;
      const time = performance.now() * 0.001;
      const now = performance.now();

      for (const el of avatarElements) {
        if (!avatarsDocked) {
          // Phase 1: free drift — circular motion like particles
          const dx = Math.sin(time * el._driftSpeed + el._driftPhase) * el._driftRadiusX;
          const dy = Math.cos(time * el._driftSpeed * 0.7 + el._driftPhase + 1.3) * el._driftRadiusY;
          el._x = el._startX + dx;
          el._y = el._startY + dy;
        } else {
          // Phase 2: fly to dock position
          const elapsed = now - avatarDockStartTime - el._dockDelay;
          if (elapsed < 0) {
            // Still waiting for stagger — keep drifting
            const dx = Math.sin(time * el._driftSpeed + el._driftPhase) * el._driftRadiusX;
            const dy = Math.cos(time * el._driftSpeed * 0.7 + el._driftPhase + 1.3) * el._driftRadiusY;
            el._x = el._startX + dx;
            el._y = el._startY + dy;
          } else {
            const t = Math.min(elapsed / DOCK_DURATION, 1);
            // Smootherstep easing
            const ease = t * t * t * (t * (t * 6 - 15) + 10);

            // Lerp from current drift position to target
            if (!el._dockFromX) {
              el._dockFromX = el._x;
              el._dockFromY = el._y;
            }
            el._x = el._dockFromX + (el._targetX - el._dockFromX) * ease;
            el._y = el._dockFromY + (el._targetY - el._dockFromY) * ease;

            // Brighten as it docks
            el.style.opacity = 0.6 + ease * 0.4;
          }
        }

        el.style.left = el._x + "px";
        el.style.top = el._y + "px";
      }
    }

    // ─── Panorama loader ──────────────────────────────
    const textureLoader = new THREE.TextureLoader();

    function loadPanorama(url) {
      return new Promise((resolve, reject) => {
        textureLoader.load(url, (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.mapping = THREE.EquirectangularReflectionMapping;

          if (panoMesh) {
            scene.remove(panoMesh);
            panoMesh.geometry.dispose();
            panoMesh.material.dispose();
          }

          const geo = new THREE.SphereGeometry(50, 64, 32);
          geo.scale(-1, 1, 1);
          const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0 });
          panoMesh = new THREE.Mesh(geo, mat);
          scene.add(panoMesh);

          const start = performance.now();
          function fadeIn() {
            const t = Math.min((performance.now() - start) / 1500, 1);
            mat.opacity = t * t;
            if (t < 1) requestAnimationFrame(fadeIn);
          }
          fadeIn();
          resolve();
        }, undefined, reject);
      });
    }

    // ─── 3D Splat Loading (SparkJS) ─────────────────────
    let sparkRenderer = null;
    let currentSplat = null;
    let sparkReady = false;
    let viewMode = "pano"; // "pano" | "3d"

    // Try loading SparkJS — non-blocking, viewer works without it
    async function initSpark() {
      try {
        const spark = await import("@sparkjsdev/spark");
        sparkRenderer = new spark.SparkRenderer({
          enableLod: false,
          renderOrder: -10,
        });
        scene.add(sparkRenderer);
        sparkReady = true;
        console.log("[spark] SparkJS initialized — 3D splat rendering available");
      } catch (err) {
        console.warn("[spark] SparkJS not available, pano-only mode:", err.message || err);
      }
    }
    initSpark();

    async function loadSplat(spzUrl) {
      if (!sparkReady) {
        console.warn("[spark] SparkJS not loaded, can't load splat");
        return false;
      }
      try {
        const spark = await import("@sparkjsdev/spark");

        // Remove old splat
        if (currentSplat) {
          scene.remove(currentSplat);
          if (currentSplat.dispose) currentSplat.dispose();
          currentSplat = null;
        }

        currentSplat = new spark.SplatMesh({ url: spzUrl });

        // Wait for init with timeout
        await Promise.race([
          currentSplat.initialized,
          new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 45000)),
        ]);

        // WorldLabs Marble coordinate transform (from sensai-webxr)
        currentSplat.scale.set(1.195, 1.195, 1.195);
        currentSplat.rotation.x = Math.PI;
        currentSplat.position.y = 1.054;
        currentSplat.renderOrder = -10;
        scene.add(currentSplat);

        // Fly-in animation
        const targetScale = currentSplat.scale.clone();
        currentSplat.scale.set(0.01, 0.01, 0.01);
        const animStart = performance.now();
        function animateIn() {
          const t = Math.min((performance.now() - animStart) / 1500, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          currentSplat.scale.lerpVectors(new THREE.Vector3(0.01,0.01,0.01), targetScale, ease);
          if (t < 1) requestAnimationFrame(animateIn);
        }
        animateIn();

        // Hide pano when splat is loaded
        if (panoMesh) panoMesh.visible = false;

        viewMode = "3d";
        console.log("[spark] Splat loaded:", spzUrl);
        return true;
      } catch (err) {
        console.warn("[spark] Splat load failed:", err.message || err);
        return false;
      }
    }

    function disposeSplat() {
      if (currentSplat) {
        scene.remove(currentSplat);
        if (currentSplat.dispose) currentSplat.dispose();
        currentSplat = null;
      }
      viewMode = "pano";
      if (panoMesh) panoMesh.visible = true;
    }

    // ─── Particle Systems ──────────────────────────────
    // 1. Ambient dust (always present, speeds up when generating)
    // 2. Spark streaks (only during generation — fast bright lines converging to center)
    // 3. Orbital ring (only during generation — swirling ring of particles)

    function createParticles() {
      // --- Ambient dust (800 particles, gentle float) ---
      const dustCount = 800;
      const dustPos = new Float32Array(dustCount * 3);
      const dustVel = [];
      const dustHome = []; // home positions for convergence
      for (let i = 0; i < dustCount; i++) {
        const x = (Math.random() - 0.5) * 80;
        const y = (Math.random() - 0.5) * 80;
        const z = (Math.random() - 0.5) * 80;
        dustPos[i * 3] = x;
        dustPos[i * 3 + 1] = y;
        dustPos[i * 3 + 2] = z;
        dustVel.push(
          (Math.random() - 0.5) * 0.008,
          Math.random() * 0.01 + 0.003,
          (Math.random() - 0.5) * 0.008
        );
        dustHome.push(x, y, z);
      }
      const dustGeo = new THREE.BufferGeometry();
      dustGeo.setAttribute("position", new THREE.BufferAttribute(dustPos, 3));
      const dustMat = new THREE.PointsMaterial({
        color: 0x6688cc, size: 0.12, transparent: true, opacity: 0.25,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      particles = new THREE.Points(dustGeo, dustMat);
      particles._velocities = dustVel;
      particles._home = dustHome;
      scene.add(particles);

      // --- Spark streaks (600 particles, hidden until generating) ---
      const sparkCount = 600;
      const sparkPos = new Float32Array(sparkCount * 3);
      const sparkVel = [];
      const sparkLife = []; // per-particle lifecycle phase
      for (let i = 0; i < sparkCount; i++) {
        // Start from random shell around origin
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 30 + Math.random() * 40;
        sparkPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        sparkPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        sparkPos[i * 3 + 2] = r * Math.cos(phi);
        sparkVel.push(0, 0, 0); // computed each frame
        sparkLife.push(Math.random()); // stagger start
      }
      const sparkGeo = new THREE.BufferGeometry();
      sparkGeo.setAttribute("position", new THREE.BufferAttribute(sparkPos, 3));
      const sparkMat = new THREE.PointsMaterial({
        color: 0xffdd66, size: 0.08, transparent: true, opacity: 0,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      sparkParticles = new THREE.Points(sparkGeo, sparkMat);
      sparkParticles._velocities = sparkVel;
      sparkParticles._life = sparkLife;
      scene.add(sparkParticles);

      // --- Orbital ring (300 particles, swirl around center) ---
      const ringCount = 300;
      const ringPos = new Float32Array(ringCount * 3);
      const ringPhase = []; // orbital angle per particle
      const ringRadius = [];
      const ringSpeed = [];
      const ringY = [];
      for (let i = 0; i < ringCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const rad = 8 + Math.random() * 15;
        const y = (Math.random() - 0.5) * 6;
        ringPos[i * 3] = Math.cos(angle) * rad;
        ringPos[i * 3 + 1] = y;
        ringPos[i * 3 + 2] = Math.sin(angle) * rad;
        ringPhase.push(angle);
        ringRadius.push(rad);
        ringSpeed.push(0.003 + Math.random() * 0.008);
        ringY.push(y);
      }
      const ringGeo = new THREE.BufferGeometry();
      ringGeo.setAttribute("position", new THREE.BufferAttribute(ringPos, 3));
      const ringMat = new THREE.PointsMaterial({
        color: 0x22ccff, size: 0.1, transparent: true, opacity: 0,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      ringParticles = new THREE.Points(ringGeo, ringMat);
      ringParticles._phase = ringPhase;
      ringParticles._radius = ringRadius;
      ringParticles._speed = ringSpeed;
      ringParticles._y = ringY;
      scene.add(ringParticles);
    }

    function setGeneratingState(state) {
      generatingState = state;
    }

    function animateParticles() {
      const time = performance.now() * 0.001;

      // Smooth transition toward target intensity
      const targetIntensity = (generatingState === "generating" || generatingState === "analyzing") ? 1 : 0;
      genTransition += (targetIntensity - genTransition) * 0.02;

      // --- Ambient dust ---
      if (particles) {
        const pos = particles.geometry.attributes.position;
        const arr = pos.array;
        const vel = particles._velocities;
        const home = particles._home;
        const speedMult = 1 + genTransition * 4; // 1x idle → 5x generating

        for (let i = 0; i < arr.length / 3; i++) {
          const i3 = i * 3;
          // Base drift
          arr[i3] += vel[i3] * speedMult;
          arr[i3 + 1] += vel[i3 + 1] * speedMult;
          arr[i3 + 2] += vel[i3 + 2] * speedMult;

          // When generating: slight pull toward center (convergence)
          if (genTransition > 0.01) {
            const pull = genTransition * 0.0008;
            arr[i3] -= arr[i3] * pull;
            arr[i3 + 1] -= arr[i3 + 1] * pull;
            arr[i3 + 2] -= arr[i3 + 2] * pull;
          }

          // Boundary wrap
          if (Math.abs(arr[i3 + 1]) > 40) arr[i3 + 1] *= -0.95;
          if (Math.abs(arr[i3]) > 50) arr[i3] *= -0.95;
          if (Math.abs(arr[i3 + 2]) > 50) arr[i3 + 2] *= -0.95;
        }
        pos.needsUpdate = true;

        // Dust gets brighter + slightly larger when generating
        particles.material.opacity = 0.25 + genTransition * 0.35;
        particles.material.size = 0.12 + genTransition * 0.08;
      }

      // --- Spark streaks (converge to center during generation) ---
      if (sparkParticles) {
        const sparkPos = sparkParticles.geometry.attributes.position;
        const sparkArr = sparkPos.array;
        const sparkLife = sparkParticles._life;
        const sparkCount = sparkArr.length / 3;

        sparkParticles.material.opacity = genTransition * 0.7;

        for (let i = 0; i < sparkCount; i++) {
          const i3 = i * 3;
          sparkLife[i] += 0.004 + genTransition * 0.012;

          if (sparkLife[i] > 1) {
            // Respawn from random shell
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 25 + Math.random() * 35;
            sparkArr[i3] = r * Math.sin(phi) * Math.cos(theta);
            sparkArr[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            sparkArr[i3 + 2] = r * Math.cos(phi);
            sparkLife[i] = 0;
          }

          // Pull toward origin (streaking inward)
          const speed = 0.02 + genTransition * 0.06;
          sparkArr[i3] -= sparkArr[i3] * speed;
          sparkArr[i3 + 1] -= sparkArr[i3 + 1] * speed;
          sparkArr[i3 + 2] -= sparkArr[i3 + 2] * speed;

          // Slight spiral
          const spiral = 0.015 * genTransition;
          const sx = sparkArr[i3];
          const sz = sparkArr[i3 + 2];
          sparkArr[i3] = sx * Math.cos(spiral) - sz * Math.sin(spiral);
          sparkArr[i3 + 2] = sx * Math.sin(spiral) + sz * Math.cos(spiral);
        }
        sparkPos.needsUpdate = true;
      }

      // --- Orbital ring (swirling around center) ---
      if (ringParticles) {
        const ringPos = ringParticles.geometry.attributes.position;
        const ringArr = ringPos.array;
        const phase = ringParticles._phase;
        const radius = ringParticles._radius;
        const speed = ringParticles._speed;
        const yArr = ringParticles._y;
        const ringCount = ringArr.length / 3;

        ringParticles.material.opacity = genTransition * 0.5;

        // Ring shrinks toward center as generation progresses
        const radiusMult = 1 - genTransition * 0.3;

        for (let i = 0; i < ringCount; i++) {
          const i3 = i * 3;
          phase[i] += speed[i] * (1 + genTransition * 3);
          const r = radius[i] * radiusMult;
          ringArr[i3] = Math.cos(phase[i]) * r;
          ringArr[i3 + 1] = yArr[i] + Math.sin(time * 0.5 + i) * 1.5 * genTransition;
          ringArr[i3 + 2] = Math.sin(phase[i]) * r;
        }
        ringPos.needsUpdate = true;
      }
    }

    // ═══════════════════════════════════════════════════
    //  AMBIENT MUSIC — Web Audio API, genre-driven
    // ═══════════════════════════════════════════════════
    let audioCtx = null;
    let musicPlaying = false;
    let musicLoop = null;
    let activeSources = [];
    let currentGenre = "orbital";
    const btnMusic = document.getElementById("btn-music");

    // Genre → sound palette: notes (Hz), waveform, filter cutoff, delay, tempo (ms between notes)
    const genreSounds = {
      noir:             { notes: [130.8,155.6,174.6,207.7,233.1], wave:"sine",     filter:600,  delay:0.5, tempo:2200, attack:0.4, release:2.0 },
      cyberpunk:        { notes: [146.8,174.6,220.0,261.6,329.6], wave:"sawtooth", filter:1200, delay:0.3, tempo:900,  attack:0.1, release:1.0 },
      solarpunk:        { notes: [261.6,329.6,392.0,440.0,523.3], wave:"triangle", filter:2000, delay:0.4, tempo:1300, attack:0.3, release:1.5 },
      brutalist:        { notes: [65.4,82.4,98.0,110.0],          wave:"sawtooth", filter:400,  delay:0.6, tempo:3000, attack:0.5, release:2.5 },
      cathedral:        { notes: [196.0,246.9,293.7,329.6,392.0], wave:"sine",     filter:1500, delay:0.7, tempo:2800, attack:0.6, release:3.0 },
      arctic:           { notes: [523.3,659.3,784.0,880.0,1047],  wave:"sine",     filter:3000, delay:0.8, tempo:2200, attack:0.5, release:2.5 },
      volcanic:         { notes: [55.0,65.4,73.4,82.4,98.0],      wave:"sawtooth", filter:300,  delay:0.4, tempo:1800, attack:0.3, release:2.0 },
      deep_sea:         { notes: [82.4,98.0,110.0,130.8,146.8],   wave:"sine",     filter:500,  delay:0.9, tempo:3500, attack:0.8, release:3.0 },

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playNote(freq, config) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;

      // Two slightly detuned oscillators for richness
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      osc1.type = config.wave;
      osc2.type = config.wave;
      osc1.frequency.setValueAtTime(freq, now);
      osc2.frequency.setValueAtTime(freq * 1.003, now); // slight detune

      // Filter
      const filter = ctx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(config.filter + Math.random() * 200, now);
      filter.Q.setValueAtTime(1.2, now);

      // Gain envelope
      const gain = ctx.createGain();
      const attack = config.attack + Math.random() * 0.2;
      const sustain = 0.5 + Math.random() * 0.8;
      const release = config.release + Math.random() * 0.5;
      const vol = 0.04 + Math.random() * 0.02;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + attack);
      gain.gain.setValueAtTime(vol * 0.8, now + attack + sustain);
      gain.gain.exponentialRampToValueAtTime(0.001, now + attack + sustain + release);

      // Delay for space
      const delay = ctx.createDelay(2.0);
      delay.delayTime.setValueAtTime(config.delay + Math.random() * 0.1, now);
      const delayGain = ctx.createGain();
      delayGain.gain.setValueAtTime(0.25, now);

      // Master gain (overall volume)
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.5, now);

      // Connect: osc → filter → gain → master → out
      //                                 → delay → delayGain → out (+ feedback)
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gain);
      gain.connect(master);
      master.connect(ctx.destination);
      gain.connect(delay);
      delay.connect(delayGain);
      delayGain.connect(ctx.destination);
      delayGain.connect(delay); // feedback

      const dur = attack + sustain + release + 1.5;
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + dur);
      osc2.stop(now + dur);
      activeSources.push(osc1, osc2);

      osc1.onended = () => {
        [osc1,osc2,filter,gain,delay,delayGain,master].forEach(n => { try { n.disconnect(); } catch {} });
        activeSources = activeSources.filter(s => s !== osc1 && s !== osc2);
      };
    }

    function startMusicLoop(genre) {
      const config = genreSounds[genre] || genreSounds.orbital;
      currentGenre = genre;

      function tick() {
        if (!musicPlaying) return;

        // Play 1-3 notes per tick (more for fast genres, fewer for ambient)
        const noteCount = config.tempo < 1000 ? 1 + Math.floor(Math.random() * 2) : 1 + Math.floor(Math.random() * 1.5);
        for (let i = 0; i < noteCount; i++) {
          const note = config.notes[Math.floor(Math.random() * config.notes.length)];
          // Occasional octave shift
          const octave = Math.random() > 0.7 ? (Math.random() > 0.5 ? 2 : 0.5) : 1;
          setTimeout(() => { if (musicPlaying) playNote(note * octave, config); }, i * 120);
        }

        // Vary timing for organic feel
        const nextTick = config.tempo + (Math.random() - 0.5) * config.tempo * 0.4;
        musicLoop = setTimeout(tick, nextTick);
      }

      tick();
    }

    function startMusic() {
      const ctx = getAudioCtx();
      if (ctx.state === "suspended") ctx.resume();
      musicPlaying = true;
      startMusicLoop(currentGenre);
      btnMusic.classList.add("active");
      btnMusic.textContent = "Mute";
    }

    function stopMusicPlayback() {
      musicPlaying = false;
      if (musicLoop) { clearTimeout(musicLoop); musicLoop = null; }
      activeSources.forEach(s => { try { s.stop(); } catch {} });
      activeSources = [];
      btnMusic.classList.remove("active");
      btnMusic.textContent = "Music";

    function parseRoute() {
      const path = window.location.pathname.replace(/^\//, "").replace(/\/$/, "");
      if (!path || path.startsWith("api")) return null;
      const parts = path.split("/");
      if (parts.length === 2) return { type: "repo", owner: parts[0], repo: parts[1] };
      if (parts.length === 1) return { type: "user", owner: parts[0] };
      return null;
    }

      fetchState();

    async function handleRoute(r) {
      if (r.type === "repo") {
        // Single repo — auto-generate
        const url = `https://github.com/${r.owner}/${r.repo}`;
        introTitle.textContent = r.repo.toUpperCase();
        introSub.textContent = `${r.owner}/${r.repo}`;
        introSub.classList.add("connecting");
        setGeneratingState("analyzing");

        // Check history first
        try {
          const histRes = await fetch(`${apiBase}/api/history`);
          const history = await histRes.json();
          const existing = history.find(h => h.repo_url.toLowerCase() === url.toLowerCase());
          if (existing) {
            const readyCh = existing.chapters.find(c => c.pano_url && c.status === "ready");
            if (readyCh) {
              bible = { world_name: existing.world_name, tagline: existing.tagline, genre: existing.genre, subgenre: "", visual_palette: { primary: "#4466aa", accent: "#22cc66" } };
              onBibleReady();
              currentRepoUrl = url;
              showRepoLink(url);
              showContributorsButton();
              hudGenre.textContent = existing.genre;
              if (readyCh.pano_url) await loadPanorama(readyCh.pano_url);
              hudChapter.textContent = readyCh.title;
              if (readyCh.marble_url) { marbleLink.href = readyCh.marble_url; marbleLink.style.display = "block"; marbleLink.textContent = "Marble 3D"; }
              currentGenre = existing.genre || "orbital";
              // Load all chapters
              chapters = existing.chapters.map((c, i) => ({ ...c, chapter_index: i, episode_title: c.title, chapter_type: c.type }));
              buildTimeline();
              return;
            }
          }
        } catch {}

        // Not in history — generate fresh
        try {
          await fetch(`${apiBase}/api/watch`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repo_url: url, chapter_count: 1, model: selectedModel }),
          });
        } catch (err) {
          hudStatus.textContent = `error: ${err.message}`;
          hudStatus.className = "status status-failed";
        }

      } else if (r.type === "user") {
        // User/org — explore constellation
        introTitle.textContent = r.owner.toUpperCase();
        introSub.textContent = "discovering repos...";
        introSub.classList.add("connecting");

        try {
          const res = await fetch(`${apiBase}/api/explore`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ owner: r.owner }),
          });
          const data = await res.json();
          if (data.error) {
            introSub.textContent = data.error;
            introSub.classList.remove("connecting");
            return;
          }
          const topRepos = data.repos.slice(0, 5);
          const repoUrls = topRepos.map(r => r.url);

          showConstellation(data.profile, topRepos);
          setGeneratingState("generating");

          await fetch(`${apiBase}/api/batch`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repo_urls: repoUrls, model: selectedModel }),
          });
        } catch (err) {
          introSub.textContent = `error: ${err.message}`;
          introSub.classList.remove("connecting");
        }
      }

    // ─── Fetch existing state ─────────────────────────
    async function fetchState() {
      try {
        const res = await fetch(`${apiBase}/api/state`);
        if (res.ok) {
          const { state, bible: b } = await res.json();
          if (state?.repo_url) { currentRepoUrl = state.repo_url; showRepoLink(currentRepoUrl); showContributorsButton(); }
          if (b && !bible) { bible = b; onBibleReady(); }
          if (state?.chapters) {
            chapters = state.chapters;
            buildTimeline();
            if (currentChapter < 0 && chapters.length > 0) {
              const lastReady = [...chapters].reverse().findIndex(c => c.status === "ready");
              const idx = lastReady >= 0 ? chapters.length - 1 - lastReady : -1;
              if (idx >= 0) { navigateToChapter(idx); return; }
            }
          }
          // State exists but no ready chapters — check if something is generating
          const hasReady = state?.chapters?.some(c => c.status === "ready");
          if (hasReady) return;
        }
      } catch {}

      // No active state with ready chapters — try loading last world from history
      await loadLastWorldFromHistory();
    }

    async function loadLastWorldFromHistory() {
      try {
        const res = await fetch(`${apiBase}/api/history`);
        const history = await res.json();
        if (!history || history.length === 0) {
          // Truly empty — show modal
          openRepoModal();
          return;
        }

        // Find most recent world with a ready chapter
        for (const entry of history) {
          const readyCh = entry.chapters.find(c => c.pano_url && c.status === "ready");
          if (readyCh) {
            // Load this world
            bible = {
              world_name: entry.world_name,
              tagline: entry.tagline,
              genre: entry.genre,
              subgenre: "",
              visual_palette: { primary: "#4466aa", secondary: "#1a1a2e", accent: "#22cc66", lighting: "", atmosphere: "" },
              repo_identity: { name: entry.repo_url.replace("https://github.com/", "") },
            };
            currentRepoUrl = entry.repo_url;
            onBibleReady();
            showRepoLink(entry.repo_url);
            showContributorsButton();
            hudGenre.textContent = entry.genre;
            hudChapter.textContent = readyCh.title;
            if (readyCh.marble_url) { marbleLink.href = readyCh.marble_url; marbleLink.style.display = "block"; marbleLink.textContent = "Marble 3D"; }
            currentGenre = entry.genre || "orbital";
            chapters = entry.chapters.map((c, i) => ({ ...c, chapter_index: i, episode_title: c.title, chapter_type: c.type }));
            buildTimeline();
            await loadPanorama(readyCh.pano_url);
            return;
          }
        }

        // No ready worlds in history either
        openRepoModal();
      } catch {
        openRepoModal();
      }
    }

    function parseGitHubUrl(input) {
      const cleaned = input.trim().replace(/\/$/, "");
      const match = cleaned.match(/github\.com\/([^/]+)(\/([^/]+))?/);
      if (!match) return null;
      const owner = match[1];
      const repo = match[3] || null;
      return { owner, repo, isRepoUrl: !!repo };
